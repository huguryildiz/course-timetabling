steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - >-
        gcloud storage buckets update gs://kairos-uctp-schedule-outputs
        --lifecycle-file=gcs-lifecycle.json
        --project=$PROJECT_ID
        || echo "Lifecycle update skipped"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - kairos
      - --source=.
      - --region=europe-west1
      - --no-allow-unauthenticated
      - --memory=8Gi
      - --cpu=4
      - --cpu-boost
      - --timeout=3600
      - --min-instances=0
      - --max-instances=5
      - --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY
