steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - kairos
      - --source=.
      - --region=europe-west1
      - --no-allow-unauthenticated
      - --memory=8Gi
      - --cpu=4
      - --cpu-boost
      - --timeout=3600
      - --min-instances=0
      - --max-instances=2
      - --project=$PROJECT_ID

options:
  logging: CLOUD_LOGGING_ONLY
