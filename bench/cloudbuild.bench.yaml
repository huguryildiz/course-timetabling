# Build the benchmark image and push it to Artifact Registry.
#   gcloud builds submit --config bench/cloudbuild.bench.yaml .
# Run from the repo root so src/ and bench/_ctx/ are in the build context.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - bench/Dockerfile
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
substitutions:
  _IMAGE: europe-west1-docker.pkg.dev/${PROJECT_ID}/kairos/kairos-bench:latest
options:
  logging: CLOUD_LOGGING_ONLY
