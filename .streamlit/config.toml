# Native baseline = light (matches ui_style _LIGHT_TOKENS). Dark theme is driven
# at runtime by ui_style.brand_css("dark") via the in-app ☀️/🌙 toggle.
[theme]
base = "light"
primaryColor = "#2B3A8C"
backgroundColor = "#F4F6FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#131722"
font = "sans serif"
